<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantify | Contact Us</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <style>
        .contact-page-bg {
            background-color: #f4f6f4; 
            padding: 80px 0;
            min-height: 80vh;
        }
        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-header h1 {
            font-family: 'Playfair Display', serif;
            color: #2c3e2d;
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .section-header p {
            font-family: 'Poppins', sans-serif;
            color: #5b7050;
            font-size: 1.1rem;
        }
        .contact-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.5fr; 
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.08); 
        }
        .contact-info-card {
            background-color: #2c3e2d; 
            color: #ffffff;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contact-info-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 40px;
            color: #e8eee6;
        }

        .info-item {
            margin-bottom: 30px;
            font-family: 'Poppins', sans-serif;
        }

        .info-item strong {
            display: block;
            font-weight: 500;
            color: #a3b89b; 
            margin-bottom: 5px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-item p {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 300;
        }
        .contact-form-card {
            padding: 60px;
            background-color: #ffffff;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            background-color: #fcfcfc;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: #5b7050;
            background-color: #ffffff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(91, 112, 80, 0.1);
        }

        .submit-btn {
            background-color: #2c3e2d;
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #1a251b; 
            transform: translateY(-2px);
        }

        @media (max-width: 992px) {
            .contact-wrapper {
                grid-template-columns: 1fr;
            }
            .contact-form-card {
                padding: 40px 25px;
            }
        }
    </style>
</head>
<body class="bg-soft-white">

    <header class="site-header bg-dark-green">
        <div class="container header-inner">
            <div class="logo">
                <h2><a href="index.html" style="color: inherit; text-decoration: none;">Plantify.</a></h2>
            </div>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="categories.html">Categories</a>
                <a href="care.html">Care Guide</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact Us</a>
            </nav>
        </div>
    </header>
    <main class="contact-page-bg">
        <div class="container">
            
            <div class="section-header">
                <h1>Get in Touch</h1>
                <p>Have a question about your green friends? Drop us a message.</p>
            </div>

            <div class="contact-wrapper">
                
                <div class="contact-info-card">
                    <h3>Contact Details</h3>
                    
                    <div class="info-item">
                        <strong>Name</strong>
                        <p>Ira Jaiswal</p>
                    </div>
                    
                    <div class="info-item">
                        <strong>Phone</strong>
                        <p>+91 98765 43XXX</p>
                    </div>
                    
                    <div class="info-item">
                        <strong>Email</strong>
                        <p>support@plantify.in</p>
                    </div>
                    
                    <div class="info-item">
                        <strong>Location</strong>
                        <p>Varanasi, India</p>
                    </div>
                </div>
                <div class="contact-form-card">
                    <form class="contact-form">
                        <div class="form-group">
                            <input type="text" placeholder="Your Full Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" placeholder="Your Email Address" required>
                        </div>
                        <div class="form-group">
                            <textarea placeholder="How can we help you?" rows="6" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Send Message</button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <footer class="site-footer bg-dark-green">
        <div class="container text-center">
            <p style="color: white; padding: 20px 0;">&copy; 2026. Crafted by Ira Jaiswal.</p>
        </div>
    </footer>

</body>
</html>
