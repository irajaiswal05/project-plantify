<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            text-align: center;
            margin-top: 50px;
            background-color: #2b2b2b;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <h1>Creating Tag By JavaScript</h1>
    
    <script>
        var p = document.createElement("img")
        document.body.appendChild(p)
        p.src="images/p1.jpg"
        
        p.style="transition:0.50s;margin:20px;border-radius:10px;cursor:pointer;"
        document.title ="No Error"
        p.style.width="30%"
        p.style.boxShadow="10px 10px 10px black" 

        p.onclick = function()
        {
            p.src="images/p2.jpg"
        }
        
        p.onmouseout = function()
        {
            p.src="images/p1.jpg"
            p.style.transform="scale(1)"
        }
        
        p.onmouseover = function()
        {
            this.style.transform="scale(1.30)"
        }
    </script>
</body>
</html>
